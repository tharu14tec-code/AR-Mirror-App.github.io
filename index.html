<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Mirror - Cute Fancy Filters</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Poppins', sans-serif; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #overlay-canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        #dressImg { position: absolute; z-index: 3; pointer-events: none; display: none; }
        
        .controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 95%; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .shelf { display: flex; gap: 12px; overflow-x: auto; width: 100%; padding: 10px; scroll-behavior: smooth; }
        .shelf::-webkit-scrollbar { display: none; }
        .item { min-width: 65px; height: 65px; border-radius: 50%; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border: 2px solid #fff; display: flex; justify-content: center; align-items: center; cursor: pointer; flex-shrink: 0; }
        .item img { width: 70%; height: 70%; object-fit: contain; }
        
        .tabs { display: flex; gap: 10px; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 25px; }
        .t-btn { padding: 8px 20px; border-radius: 20px; color: #fff; border: none; background: none; cursor: pointer; font-size: 13px; }
        .t-btn.active { background: #fff; color: #000; font-weight: 600; }
        
        #loading { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 99; color: #fff; }
    </style>
</head>
<body>
    <div id="loading">✨ Loading Cute Filters...</div>

    <div id="container">
        <video id="input_video" autoplay playsinline muted></video>
        <canvas id="overlay-canvas"></canvas>
        <img id="dressImg" src="" crossorigin="anonymous">

        <div class="controls">
            <div id="shelf" class="shelf"></div>
            <div class="tabs">
                <button id="tab-dress" class="t-btn active" onclick="setMode('dresses')">Dresses</button>
                <button id="tab-filter" class="t-btn" onclick="setMode('filters')">Cute Filters</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyDyUkeaGcqQ01TqDz-5SYlS48KDOb2Sh5M", databaseURL: "https://ar-mirror-app-1-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const video = document.getElementById('input_video');
        const dressImg = document.getElementById('dressImg');
        const canvas = document.getElementById('overlay-canvas');
        const ctx = canvas.getContext('2d');
        const shelf = document.getElementById('shelf');

        let mode = 'dresses';
        let currentFilter = null;
        const filterImgs = {};

        // --- Cute Filters Assets ---
        const cuteFilters = [
            { id: 'none', name: 'None', icon: '🚫' },
            { id: 'hearts', name: 'Hearts', url: 'https://i.imgur.com/vD9S6Yh.png' },
            { id: 'cat', name: 'Cute Cat', url: 'https://i.imgur.com/6vR8SQu.png' },
            { id: 'stars', name: 'Blush Stars', url: 'https://i.imgur.com/u5p9v8n.png' },
            { id: 'crown', name: 'Gold Crown', url: 'https://i.imgur.com/Ynx7mGj.png' }
        ];

        // Preload Filter Images
        cuteFilters.forEach(f => { if(f.url) { const img = new Image(); img.src = f.url; img.crossOrigin = "anonymous"; filterImgs[f.id] = img; } });

        window.setMode = (m) => {
            mode = m;
            document.getElementById('tab-dress').classList.toggle('active', m === 'dresses');
            document.getElementById('tab-filter').classList.toggle('active', m === 'filters');
            if(m === 'filters') dressImg.style.display = 'none';
            else currentFilter = null;
            loadShelf();
        };

        function loadShelf() {
            shelf.innerHTML = '';
            if(mode === 'dresses') {
                onValue(ref(db, 'dresses'), (snap) => {
                    shelf.innerHTML = '<div class="item" onclick="clearAll()">🚫</div>';
                    snap.forEach(c => {
                        const d = c.val();
                        const div = document.createElement('div'); div.className = 'item';
                        div.innerHTML = `<img src="${d.url}" crossorigin="anonymous">`;
                        div.onclick = () => { dressImg.src = d.url; dressImg.style.display = 'block'; };
                        shelf.appendChild(div);
                    });
                });
            } else {
                cuteFilters.forEach(f => {
                    const div = document.createElement('div'); div.className = 'item';
                    div.innerHTML = f.icon || `<img src="${f.url}" crossorigin="anonymous">`;
                    div.onclick = () => currentFilter = (f.id === 'none') ? null : f.id;
                    shelf.appendChild(div);
                });
            }
        }

        window.clearAll = () => { dressImg.style.display = 'none'; currentFilter = null; ctx.clearRect(0, 0, canvas.width, canvas.height); };

        // --- Face Mesh (For Cute Filters) ---
        const faceMesh = new FaceMesh({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
        faceMesh.onResults(res => {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(!res.multiFaceLandmarks || !currentFilter) return;

            const landmarks = res.multiFaceLandmarks[0];
            const img = filterImgs[currentFilter];
            if(!img) return;

            // පාවිච්චි කරන්නාගේ මූණේ ලක්ෂ්‍ය අනුව Filter එක තැබීම
            const topHead = landmarks[10]; // නළල මුදුන
            const chin = landmarks[152]; // නිකට
            const leftCheek = landmarks[234];
            const rightCheek = landmarks[454];

            const width = Math.abs(rightCheek.x - leftCheek.x) * canvas.width * 2.5;
            const height = width * (img.height / img.width);
            const x = topHead.x * canvas.width;
            const y = topHead.y * canvas.height;

            ctx.save();
            ctx.translate(x, y);
            // මූණ ඇල කරන පැත්තට Filter එකත් ඇල කිරීම
            const angle = Math.atan2(rightCheek.y - leftCheek.y, rightCheek.x - leftCheek.x);
            ctx.rotate(angle);
            ctx.scale(-1, 1); // Mirror Effect
            ctx.drawImage(img, -width/2, -height/0.8, width, height);
            ctx.restore();
        });

        // --- Pose Tracking (For Dresses) ---
        const pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 0 });
        pose.onResults(res => {
            if(!res.poseLandmarks || mode !== 'dresses' || !dressImg.src) return;
            const ls = res.poseLandmarks[11], rs = res.poseLandmarks[12];
            const cX = (ls.x + rs.x) / 2 * window.innerWidth;
            const cY = (ls.y + rs.y) / 2 * window.innerHeight;
            const w = Math.abs(ls.x - rs.x) * window.innerWidth * 2.3;
            dressImg.style.left = `${cX}px`; dressImg.style.top = `${cY}px`;
            dressImg.style.width = `${w}px`; dressImg.style.transform = `translate(-50%, -15%) scaleX(-1)`;
        });

        const cam = new Camera(video, { onFrame: async () => { 
            await faceMesh.send({image: video});
            await pose.send({image: video});
        }, width: 1280, height: 720 });
        
        cam.start().then(() => { document.getElementById('loading').style.display = 'none'; loadShelf(); });
    </script>
</body>
</html>
