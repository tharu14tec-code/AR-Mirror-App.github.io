<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Smart Mirror - Easy Filter</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/deepar/js/deepar.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Poppins', sans-serif; }
        #main-container { position: relative; width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas#deepar-canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
        #dressImg { position: absolute; z-index: 3; pointer-events: none; display: none; filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.5)); }
        
        /* පහළින් තියෙන Control Panel එක */
        .controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 10; }
        
        .filter-slider { display: flex; gap: 10px; overflow-x: auto; width: 100%; padding: 10px; scroll-behavior: smooth; }
        .filter-slider::-webkit-scrollbar { display: none; }
        
        .f-item { min-width: 70px; height: 70px; border-radius: 50%; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border: 2px solid #fff; display: flex; justify-content: center; align-items: center; color: #fff; font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; }
        
        .tab-bar { display: flex; gap: 10px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.2); }
        .t-btn { padding: 8px 20px; border-radius: 20px; color: #fff; font-size: 13px; border: none; background: none; cursor: pointer; }
        .t-btn.active { background: #fff; color: #000; font-weight: 600; }

        #loading { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 99; color: #fff; }
    </style>
</head>
<body>
    <div id="loading">✨ Magic is loading...</div>

    <div id="main-container">
        <video id="input_video" autoplay playsinline muted></video>
        <canvas id="deepar-canvas"></canvas>
        <img id="dressImg" src="" crossorigin="anonymous">

        <div class="controls">
            <div id="filter-shelf" class="filter-slider"></div>
            
            <div class="tab-bar">
                <button id="btn-dress" class="t-btn active" onclick="setMode('dresses')">Dresses</button>
                <button id="btn-filter" class="t-btn" onclick="setMode('filters')">3D Filters</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyDyUkeaGcqQ01TqDz-5SYlS48KDOb2Sh5M", databaseURL: "https://ar-mirror-app-1-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const video = document.getElementById('input_video');
        const dressImg = document.getElementById('dressImg');
        const shelf = document.getElementById('filter-shelf');
        let mode = 'dresses';
        let deepAR;

        // --- DeepAR ලේසිම Filters ලින්ක් ටික ---
        const quickFilters = [
            { name: 'None', url: '' },
            { name: 'Sunglasses', url: 'https://cdn.jsdelivr.net/npm/deepar/effects/Aviators.deepar' },
            { name: 'Devil', url: 'https://cdn.jsdelivr.net/npm/deepar/effects/Devil_Horns.deepar' },
            { name: 'Dog', url: 'https://cdn.jsdelivr.net/npm/deepar/effects/Dalmatian.deepar' },
            { name: 'Flower', url: 'https://cdn.jsdelivr.net/npm/deepar/effects/Flower_Crown.deepar' },
            { name: 'Beard', url: 'https://cdn.jsdelivr.net/npm/deepar/effects/Beard.deepar' },
            { name: 'Lion', url: 'https://cdn.jsdelivr.net/npm/deepar/effects/Lion.deepar' },
            { name: 'Makeup', url: 'https://cdn.jsdelivr.net/npm/deepar/effects/Beauty.deepar' }
        ];

        async function initAR() {
            deepAR = await deepar.initialize({
                licenseKey: 'Cc673e6361a62b2de5a769fb5b621aca4aea26c8484c7976b62f5b0950b47489dda89562aac97abb',
                canvas: document.getElementById('deepar-canvas'),
                videoElement: video
            });
            document.getElementById('loading').style.display = 'none';
            loadShelf();
        }

        window.setMode = (m) => {
            mode = m;
            document.getElementById('btn-dress').classList.toggle('active', m === 'dresses');
            document.getElementById('btn-filter').classList.toggle('active', m === 'filters');
            if(m === 'filters') dressImg.style.display = 'none';
            if(m === 'dresses') deepAR.switchEffect('');
            loadShelf();
        };

        function loadShelf() {
            shelf.innerHTML = '';
            if(mode === 'dresses') {
                onValue(ref(db, 'dresses'), (snap) => {
                    shelf.innerHTML = '<div class="f-item" onclick="clearAll()">🚫</div>';
                    snap.forEach(c => {
                        const d = c.val();
                        const item = document.createElement('div');
                        item.className = 'f-item';
                        item.innerHTML = `<img src="${d.url}" style="width:70%" crossorigin="anonymous">`;
                        item.onclick = () => { dressImg.src = d.url; dressImg.style.display = 'block'; };
                        shelf.appendChild(item);
                    });
                });
            } else {
                quickFilters.forEach(f => {
                    const item = document.createElement('div');
                    item.className = 'f-item';
                    item.innerText = f.name;
                    item.onclick = () => deepAR.switchEffect(f.url);
                    shelf.appendChild(item);
                });
            }
        }

        window.clearAll = () => { dressImg.style.display = 'none'; deepAR.switchEffect(''); };

        // Pose Tracking
        const pose = new Pose({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
        pose.setOptions({ modelComplexity: 0 });
        pose.onResults(res => {
            if(!res.poseLandmarks || mode !== 'dresses' || !dressImg.src) return;
            const ls = res.poseLandmarks[11], rs = res.poseLandmarks[12];
            const cX = (ls.x + rs.x) / 2 * window.innerWidth;
            const cY = (ls.y + rs.y) / 2 * window.innerHeight;
            const w = Math.abs(ls.x - rs.x) * window.innerWidth * 2.3;
            dressImg.style.left = `${cX}px`; dressImg.style.top = `${cY}px`;
            dressImg.style.width = `${w}px`; dressImg.style.transform = `translate(-50%, -15%) scaleX(-1)`;
        });

        const cam = new Camera(video, { onFrame: async () => { await pose.send({image: video}); }, width: 1280, height: 720 });
        cam.start();
        initAR();
    </script>
</body>
</html>
